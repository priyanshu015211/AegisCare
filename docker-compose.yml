# docker-compose.yml
# AegisCare development environment
# Run: docker-compose up --build

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aegiscare_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - BACKEND_HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aegiscare_frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=8501
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: aegiscare_network
