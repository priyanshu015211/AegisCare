# render.yaml — Render deployment configuration for AegisCare

services:
  - type: web
    name: aegiscare-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # Bug 10 fix: pass --workers so the BACKEND_WORKERS env var is respected.
    # Render's free tier is single-core so the default of 1 is correct there,
    # but paid tiers with multiple vCPUs need this wired up to scale.
    # Set BACKEND_WORKERS in the Render dashboard to match your instance's vCPUs.
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers ${BACKEND_WORKERS:-1}
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # Number of uvicorn worker processes.
      # Default 1 is correct for Render free tier (single vCPU).
      # Set to 2–4 on paid tiers — rule of thumb: 2 × vCPUs + 1.
      - key: BACKEND_WORKERS
        value: "1"

      # SECRET_KEY must be a stable, long random string set manually in the
      # Render dashboard (Environment → Secret Files or env vars).
      # Do NOT use generateValue: true — that creates a new key on every
      # deploy, which invalidates all active sessions and signed tokens.
      # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
      - key: SECRET_KEY
        sync: false   # set manually in Render dashboard

      # ALLOWED_ORIGINS must list your actual frontend domain(s).
      # A wildcard ("*") allows any website to make cross-origin requests
      # to this API, which combined with unauthenticated endpoints means
      # the entire API is open to the public internet.
      # Example: "https://aegiscare.onrender.com,https://app.aegiscare.io"
      - key: ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard

    healthCheckPath: /health

  # ---------------------------------------------------------------
  # Bug 4 fix: frontend service was missing entirely from render.yaml.
  # Without this block the Streamlit UI is never deployed on Render.
  # ---------------------------------------------------------------
  - type: web
    name: aegiscare-frontend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: APP_ENV
        value: production

      # Point the frontend at the deployed backend.
      # Set this to the Render URL of the aegiscare-backend service,
      # e.g. https://aegiscare-backend.onrender.com
      - key: BACKEND_URL
        sync: false   # set manually in Render dashboard

      # Static bearer token used by the frontend API client.
      # Must match what the backend accepts until real Supabase JWT
      # auth is implemented (see auth.py TODO).
      - key: AEGISCARE_TOKEN
        sync: false   # set manually in Render dashboard

      # Required so that "from frontend.xxx import ..." resolves correctly
      # when Streamlit runs frontend/app.py from the repo root.
      - key: PYTHONPATH
        value: /opt/render/project/src

    healthCheckPath: /_stcore/health
